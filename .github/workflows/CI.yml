name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
            PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  linux-py38-ort:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      PYTHON_VERSION: '3.8'
      ORT_VERSION: 'v1.22.0'
      ORT_ROOT: '/opt/onnxruntime'
      ORT_BUILD_DIR: '/opt/onnxruntime/build/Linux/Release'
      CFLAGS: '-O2 -march=x86-64 -mtune=generic -mno-avx -mno-avx2 -mno-fma'
      CXXFLAGS: '-O2 -march=x86-64 -mtune=generic -mno-avx -mno-avx2 -mno-fma'
      RUSTFLAGS: '-C target-cpu=x86-64 -C target-feature=-avx,-avx2,-fma'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            curl \
            git
      - name: Prepare ONNX Runtime source (shallow + retry)
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local n=1
            local max=4
            local sleep_s=8
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "$n" -ge "$max" ]; then
                echo "Command failed after ${max} attempts: $*"
                return 1
              fi
              echo "Attempt ${n}/${max} failed, retry in ${sleep_s}s: $*"
              sleep "$sleep_s"
              n=$((n + 1))
            done
          }

          sudo rm -rf "${ORT_ROOT}"
          if retry git clone --branch "${ORT_VERSION}" --depth 1 --progress https://github.com/microsoft/onnxruntime.git "${ORT_ROOT}"; then
            echo "Using ORT ref via --branch: ${ORT_VERSION}"
          else
            echo "--branch failed for ${ORT_VERSION}, fallback to tag checkout"
            retry git clone --depth 1 --progress https://github.com/microsoft/onnxruntime.git "${ORT_ROOT}"
            cd "${ORT_ROOT}"
            retry git fetch --tags --depth 1 origin
            retry git checkout "tags/${ORT_VERSION}" -b "build-${ORT_VERSION}"
          fi
          cd "${ORT_ROOT}"
          retry git submodule sync --recursive
          retry git -c submodule.fetchJobs=8 submodule update --init --recursive --depth 1 --progress
      - name: Build ONNX Runtime (generic x86_64)
        shell: bash
        run: |
          set -euo pipefail
          cd "${ORT_ROOT}"
          ./build.sh \
            --config Release \
            --build_shared_lib \
            --parallel \
            --skip_tests
      - name: Verify ONNX Runtime output
        shell: bash
        run: |
          set -euo pipefail
          find "${ORT_ROOT}/build" -name 'libonnxruntime.so*' | sort
          test -f "${ORT_BUILD_DIR}/libonnxruntime.so"
      - name: Build wheels (Python 3.8 with local ORT)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade maturin

          export ORT_LIB_PATH="${ORT_BUILD_DIR}"
          export ORT_LIB_PROFILE="Release"
          export ORT_PREFER_DYNAMIC_LINK="1"
          export LD_LIBRARY_PATH="${ORT_BUILD_DIR}:${LD_LIBRARY_PATH:-}"

          maturin build --release --out dist --find-interpreter
      - name: Import test with built wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv-test
          source .venv-test/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          export LD_LIBRARY_PATH="${ORT_BUILD_DIR}:${LD_LIBRARY_PATH:-}"
          python - <<'PY'
          import bili_ticket_gt_python
          print('import ok')
          PY
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x64-py38-ort
          path: dist

  macos-arm64:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist --find-interpreter
          sccache: 'true'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [windows, linux, linux-py38-ort, macos-arm64, sdist]
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
